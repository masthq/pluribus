<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mast Mentions — Pluribus HQ</title>
<link rel="stylesheet" href="design-tokens.css">
<style>

/* ─── MENTIONS HEADER ─────────────────────────────────────────────────────── */
.mentions-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.mentions-eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .13em;
  color: var(--crimson);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.mentions-title { font-size: 22px; font-weight: 700; color: var(--text); }
.mentions-sub { font-size: 11px; color: var(--text-sec); margin-top: 3px; }
.mentions-count { font-size: 11px; color: var(--text-sec); font-weight: 600; }

/* ─── FILTER BAR ──────────────────────────────────────────────────────────── */
.mentions-filters {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.mf-label { font-size: 9px; font-weight: 700; letter-spacing: .10em; color: var(--text-sec); text-transform: uppercase; margin-right: 4px; }
.mf-btn {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-dim);
  background: transparent;
  color: var(--text-sec);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
}
.mf-btn:hover { border-color: rgba(184,150,62,0.4); color: var(--text); }
.mf-btn.active { background: rgba(139,0,0,0.15); border-color: rgba(139,0,0,0.4); color: #e08080; }
.mf-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.08); margin: 0 2px; }
.mf-search {
  margin-left: auto;
  background: var(--navy-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 11px;
  outline: none;
  width: 200px;
  transition: border-color .15s;
}
.mf-search:focus { border-color: rgba(184,150,62,0.45); }
.mf-search::placeholder { color: var(--text-dim); }

/* ─── DUPLICATE NOTICE ────────────────────────────────────────────────────── */
.dupe-notice {
  font-size: 10px;
  color: var(--text-dim);
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  margin-bottom: 14px;
  display: none;
}

/* ─── MENTION CARDS ───────────────────────────────────────────────────────── */
.mentions-grid { display: flex; flex-direction: column; gap: 6px; }

.mention-card {
  background: var(--navy-card);
  border: 1px solid var(--border-card);
  border-left: 3px solid var(--crimson);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  transition: border-color .2s, background .2s;
  display: block;
  text-decoration: none;
}
.mention-card:hover {
  background: var(--navy-hover);
  border-color: rgba(139,0,0,0.45);
  border-left-color: var(--crimson-lt);
}

.mention-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 7px;
}
.mention-headline {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  flex: 1;
}
.mention-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.mention-outlet {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--red-muted);
  background: rgba(139,0,0,0.12);
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.mention-market {
  font-size: 9px;
  color: var(--text-sec);
  font-weight: 600;
  white-space: nowrap;
}
.mention-date { font-size: 9px; color: var(--text-dim); white-space: nowrap; }

.mention-excerpt {
  font-size: 11.5px;
  color: var(--text-sec);
  line-height: 1.55;
  margin-bottom: 10px;
  font-style: italic;
}

.mention-footer {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.mention-stat {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.mention-stat span {
  color: var(--text-sec);
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
}

/* Source link button */
.mention-link {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--gold-lt);
  background: rgba(184,150,62,0.10);
  border: 1px solid rgba(184,150,62,0.3);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all .15s;
  white-space: nowrap;
}
.mention-link:hover {
  background: rgba(184,150,62,0.20);
  border-color: var(--gold);
  color: var(--gold);
}
.mention-link-cm {
  color: var(--text-dim);
  background: transparent;
  border-color: var(--border-dim);
}
.mention-link-cm:hover { color: var(--text-sec); border-color: rgba(255,255,255,.2); }

/* ─── EMPTY / LOADING ─────────────────────────────────────────────────────── */
.mentions-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 12px;
  display: none;
}
.mentions-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: .4; }
.mentions-loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
}

</style>
</head>
<body>

<!-- CHYRON -->
<div class="chyron">
  <div class="chyron-inner" id="chyronInner">
    <div class="chyron-item"><span class="chyron-label">LIVE</span><span class="chyron-dot"></span></div>
    <div class="chyron-item"><span class="chyron-label">MENTIONS</span> Loading latest mentions…</div>
    <div class="chyron-item"><span class="chyron-dot"></span></div>
    <div class="chyron-item"><span class="chyron-label">MENTIONS</span> Loading latest mentions…</div>
    <div class="chyron-item"><span class="chyron-dot"></span></div>
  </div>
</div>

<!-- NAV -->
<div class="nav-outer">
  <div class="nav-inner">
    <a href="mast-hq.html" class="nav-logo">P</a>
    <a href="mast-hq.html" class="nav-link">Mast HQ</a>
    <a href="political-universe.html" class="nav-link">Political Universe</a>
    <a href="clipdrop.html" class="nav-link">Clip Drop</a>
    <a href="mast-mentions.html" class="nav-link active">Mast Mentions</a>
    <div class="nav-date" id="navDate"></div>
  </div>
</div>

<!-- PAGE -->
<div class="main-outer">
<div class="main-inner">

  <div class="mentions-header">
    <div>
      <div class="mentions-eyebrow">Media · Monitoring</div>
      <div class="mentions-title">Mast Mentions</div>
      <div class="mentions-sub">Critical Mention alerts · auto-updated every 5 min · source links auto-populated</div>
    </div>
    <div class="mentions-count" id="mentionsCount">—</div>
  </div>

  <div class="mentions-filters">
    <span class="mf-label">Filter</span>
    <button class="mf-btn active" data-filter="all">All</button>
    <button class="mf-btn" data-filter="National">National</button>
    <button class="mf-btn" data-filter="Local">Local</button>
    <button class="mf-btn" data-filter="United Kingdom">Intl</button>
    <div class="mf-sep"></div>
    <button class="mf-btn" data-filter="today">Today</button>
    <input class="mf-search" type="text" placeholder="Search mentions…" id="mentionSearch">
  </div>

  <div class="dupe-notice" id="dupeNotice" style="display:none"></div>
  <div id="mentionsLoading" class="mentions-loading">Loading mentions…</div>
  <div class="mentions-grid" id="mentionsGrid"></div>
  <div id="mentionsEmpty" class="mentions-empty">
    <div class="mentions-empty-icon">📭</div>
    No mentions found.
  </div>

</div>
</div>

<script>
const SHEET_ID  = '15eRR2J10xIe1TRaXBJ4w4z-5IPag_m-NLPHROIbo4Bk';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

document.getElementById('navDate').textContent =
  new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

let allMentions = [];
let activeFilter = 'all';
let searchQuery  = '';

// ── HELPERS ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function stripJunk(str) {
  return String(str||'')
    .replace(/<[^>]+>/g,'').replace(/https?:\/\/\S+/g,'')
    .replace(/\[.*?\]/g,'').replace(/\s{2,}/g,' ').trim();
}
function highlightMast(text) {
  return escHtml(stripJunk(text)).replace(
    /(Brian Mast|Rep\.?\s*Mast|Mast)/g,
    '<strong style="color:#ffffff;font-weight:700">$1</strong>'
  );
}
function extractMastSentence(text) {
  if (!text) return '';
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  const hits = sentences.filter(s => /Brian Mast|Rep\.?\s*Mast|\bMast\b/i.test(s));
  return hits.length ? hits.join(' ').trim() : stripJunk(text).slice(0, 200);
}

// ── DEDUPLICATION ────────────────────────────────────────────────────────────
// Fingerprint = normalized headline + outlet. Keeps the FIRST occurrence (newest
// after .reverse()), drops subsequent exact duplicates.
function deduplicateMentions(mentions) {
  const seen = new Set();
  const unique = [];
  let dupeCount = 0;
  for (const m of mentions) {
    // Normalize: lowercase, collapse whitespace, strip punctuation
    const fp = (m.headline + '||' + m.outlet)
      .toLowerCase()
      .replace(/[^\w\s|]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
    if (seen.has(fp)) {
      dupeCount++;
    } else {
      seen.add(fp);
      unique.push(m);
    }
  }
  return { unique, dupeCount };
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchMentions() {
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    const raw = rows.map(row => {
      let tsRaw = row.c[0]?.v || '';
      let dateStr = '';
      if (typeof tsRaw === 'string' && tsRaw.startsWith('Date(')) {
        const parts = tsRaw.replace('Date(','').replace(')','').split(',').map(Number);
        dateStr = new Date(parts[0], parts[1], parts[2])
          .toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      }
      const dcRaw = row.c[4]?.v || '';
      return {
        timestamp     : dateStr,
        headline      : row.c[1]?.v || '',
        outlet        : row.c[2]?.v || '',
        market        : row.c[3]?.v || '',
        dateCollected : dcRaw ? stripJunk(dcRaw) : dateStr,
        excerpt       : row.c[5]?.v || '',
        audience      : row.c[6]?.v || '',
        publicity     : row.c[7]?.v || '',
        // Column I (index 8) — source URL, optional
        sourceUrl     : row.c[8]?.v ? String(row.c[8].v).trim() : '',
      };
    })
    .filter(m => m.headline)
    .reverse(); // newest first

    // Deduplicate
    const { unique, dupeCount } = deduplicateMentions(raw);
    allMentions = unique;

    // Show dupe notice if any were removed
    const dupeEl = document.getElementById('dupeNotice');
    if (dupeCount > 0) {
      dupeEl.textContent = `${dupeCount} duplicate${dupeCount > 1 ? 's' : ''} removed automatically.`;
      dupeEl.style.display = 'block';
    } else {
      dupeEl.style.display = 'none';
    }

    document.getElementById('mentionsLoading').style.display = 'none';
    render();
    updateChyron();
  } catch(e) {
    document.getElementById('mentionsLoading').textContent = 'Could not load mentions. Check sheet permissions.';
    console.error(e);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const grid  = document.getElementById('mentionsGrid');
  const empty = document.getElementById('mentionsEmpty');
  grid.innerHTML = '';

  let filtered = allMentions.filter(m => {
    if (activeFilter === 'today') {
      const today = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      return m.timestamp === today || m.dateCollected.includes(
        new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})
      );
    }
    if (activeFilter !== 'all') {
      return (m.market||'').toLowerCase().includes(activeFilter.toLowerCase()) ||
             (m.outlet||'').toLowerCase().includes(activeFilter.toLowerCase());
    }
    return true;
  });

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(m =>
      m.headline.toLowerCase().includes(q) ||
      m.outlet.toLowerCase().includes(q)   ||
      m.excerpt.toLowerCase().includes(q)
    );
  }

  document.getElementById('mentionsCount').textContent =
    `${filtered.length} mention${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'mention-card';

    // Make whole card clickable if source URL present
    if (m.sourceUrl) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', e => {
        if (!e.target.closest('a')) window.open(m.sourceUrl, '_blank', 'noopener');
      });
    }

    const dateStr = m.dateCollected || m.timestamp || '';
    const mastSentence = extractMastSentence(m.excerpt);
    const cleanAudience  = stripJunk(m.audience);
    const cleanPublicity = stripJunk(m.publicity);

    // Link button logic:
    // - If sourceUrl in sheet → "Open Article ↗" (gold)
    // - Else → "View in CM ↗" (dim, links to CM app search)
    const cmSearchUrl = `https://app.criticalmention.com/app/#/mentions/search?q=${encodeURIComponent(m.headline.slice(0,60))}`;
    const linkHTML = m.sourceUrl
      ? `<a class="mention-link" href="${escHtml(m.sourceUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open Article ↗</a>`
      : `<a class="mention-link mention-link-cm" href="${escHtml(cmSearchUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View in CM ↗</a>`;

    card.innerHTML = `
      <div class="mention-top">
        <div class="mention-headline">${highlightMast(m.headline)}</div>
        <div class="mention-badges">
          <span class="mention-outlet">${escHtml(stripJunk(m.outlet))}</span>
          ${m.market ? `<span class="mention-market">${escHtml(stripJunk(m.market))}</span>` : ''}
          <span class="mention-date">${escHtml(dateStr)}</span>
        </div>
      </div>
      ${mastSentence ? `<div class="mention-excerpt">"${highlightMast(mastSentence)}"</div>` : ''}
      <div class="mention-footer">
        ${cleanAudience  ? `<div class="mention-stat">Audience <span>${Number(cleanAudience.replace(/,/g,'')).toLocaleString()}</span></div>` : ''}
        ${cleanPublicity ? `<div class="mention-stat">Est. Value <span>${escHtml(cleanPublicity)}</span></div>` : ''}
        ${linkHTML}
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── CHYRON ────────────────────────────────────────────────────────────────────
function updateChyron() {
  if (!allMentions.length) return;
  const inner = document.getElementById('chyronInner');
  const items = allMentions.slice(0, 8).map(m => {
    const label = m.outlet ? stripJunk(m.outlet).toUpperCase().slice(0, 20) : 'MENTION';
    const hed = escHtml(stripJunk(m.headline).slice(0, 90));
    return `<div class="chyron-item"><span class="chyron-label">${label}</span>${hed}${m.headline.length > 90 ? '…' : ''}</div><div class="chyron-item"><span class="chyron-dot"></span></div>`;
  }).join('');
  inner.innerHTML = items + items;
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.mf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById('mentionSearch').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
fetchMentions();
setInterval(fetchMentions, 5 * 60 * 1000);
</script>
</body>
</html>
